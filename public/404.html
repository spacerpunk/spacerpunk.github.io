<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>spcrpnk</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Encodes the full path/query/hash into a ?p= query param and
      // redirects to the root so index.html (React Router) can handle it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
